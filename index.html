    // Helper: afficher un toast
    function showToast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.style.background = type === 'error' ? '#ff4757' : '#1e2a5e';
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);

    // Chiffrement simple (base64 + décalage) pour éviter une modification trop facile - pas vraiment du chiffrement, mais rend plus difficile la modification manuelle
    function encrypt(data) {
        try {
            let str = JSON.stringify(data);
            let encoded = btoa(unescape(encodeURIComponent(str))).split('').reverse().join('');
            return encoded;
        } catch(e) { return data; }
    }
    function decrypt(encoded) {
        try {
            let decoded = decodeURIComponent(escape(atob(encoded.split('').reverse().join(''))));
            return JSON.parse(decoded);
        } catch(e) { return null; }
    }

    // Stockage local sécurisé
    function loadDB() {
        let encryptedUsers = localStorage.getItem('ba_users_secure');
        if (encryptedUsers) {
            let users = decrypt(encryptedUsers);
            if (users && Array.isArray(users)) return users;
        }
        return [];
    }
    function saveDB(users) {
        let encrypted = encrypt(users);
        localStorage.setItem('ba_users_secure', encrypted);
    }
    function loadTransfers() {
        let enc = localStorage.getItem('ba_transfers_secure');
        if (enc) { let d = decrypt(enc); if (d) return d; }
        return [];
    }
    function saveTransfers(transfers) { localStorage.setItem('ba_transfers_secure', encrypt(transfers)); }
    function loadWithdrawals() { let enc = localStorage.getItem('ba_withdrawals_secure'); if (enc) { let d = decrypt(enc); if (d) return d; } return []; }
    function saveWithdrawals(withdrawals) { localStorage.setItem('ba_withdrawals_secure', encrypt(withdrawals)); }
    function loadLinks() { let enc = localStorage.getItem('ba_links_secure'); if (enc) { let d = decrypt(enc); if (d) return d; } return []; }
